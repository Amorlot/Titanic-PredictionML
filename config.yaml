loader:
  train_path: data/train.csv
  test_path: data/test.csv
  target_col: Survived
  drop_cols:
    - PassengerId
    - Ticket
  drop_missing_thresh: 0.8

feature_engineering:
  enabled: true
  drop_raw_fare_for:    # rimuove Fare grezzo (rimane FarePerPerson) per modelli lineari
    - logreg
    - svm

cleaner:
  num_strategy: knn       # median | mean | most_frequent | knn
  cat_strategy: knn       # unknown | most_frequent | knn
  knn_neighbors: 5

outliers:
  detection:              # iqr | zscore | [iqr, zscore]
    - iqr
    - zscore
  treatment: winsorization
  iqr_threshold: 1.5
  zscore_threshold: 3.0
  cols:                   # lista colonne specifiche, vuoto = tutti i numerici
    - Fare
    - Age
  apply_to:               # modelli che ricevono dati winsorizzati
    - logreg

multicollinearity:
  threshold: 0.85       # soglia |r| oltre cui due feature sono considerate collineari
  drop: true            # true = droppa automaticamente, false = solo report
  apply_to:
    - logreg

pca:
  n_components: 0.95    # float = varianza spiegata, int = n componenti fisso
  apply_to:
    - logreg

encoder:
  num_strategy: standard
  cat_strategy: ohe

models:
  active:
    - logreg
    - xgboost
    - decision_tree
    - random_forest
    - svm
  cv: 5
  scoring: f1_weighted
  random_state: 42
  tune_threshold: false     # cerca la soglia ottimale dopo il training
  threshold_scoring: f1     # f1 | f1_weighted | accuracy | recall | precision

model_cache:
  enabled: false
  path: models/

ensemble:
  enabled: true
  voting: soft          # soft | hard
  # weights: auto       # auto = usa CV score di ogni membro come peso
  weights:              # oppure pesi manuali (verranno normalizzati)
    xgboost: 2
    random_forest: 2
    logreg: 1
    svm: 1
    decision_tree: 1
  members:              # modelli da includere (devono essere in models.active)
    - xgboost
    - logreg
    - svm

output:
  submission_dir: data/submissions/
